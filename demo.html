<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solstice Cipher Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #121417;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 218, 99, 0.58), transparent 28rem),
        linear-gradient(135deg, #fff5d6 0%, #f7f4ea 48%, #dfe9f4 100%);
    }

    main {
      width: min(100%, 1100px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: rgba(18, 20, 23, 0.68);
      font-size: 16px;
    }

    video {
      display: block;
      width: 100%;
      border: 1px solid rgba(18, 20, 23, 0.16);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(18, 20, 23, 0.16);
      background: #121417;
    }

    a {
      color: #2768a6;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Solstice Cipher Demo</h1>
    <p>A 12-second playthrough clip. <a href="./">Play the game</a> or <a href="./demo.mp4">open the direct MP4</a>.</p>
    <video controls playsinline preload="metadata" poster="./preview.png">
      <source src="./demo.mp4" type="video/mp4">
      Your browser cannot play this MP4. Use the direct download link above.
    </video>
  </main>
</body>
</html>
